<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Grid</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f3f3f3;
    }

    .wrapper {
        max-width: 1200px;
        margin: 40px auto;
        background: #fff;
        padding: 30px;
    }

    /* GRID CHÍNH */
    .products {
        display: grid;
        grid-template-columns: repeat(6, 1fr);
        gap: 20px;
    }

    /* CARD SẢN PHẨM */
    .product {
        display: grid;
        grid-template-rows: 150px auto auto auto;
        text-align: center;
        font-size: 13px;
    }

    .product img {
        width: 100%;
        height: 100%;
        object-fit: contain;
    }

    .product h4 {
        margin: 8px 0 4px;
        font-weight: normal;
    }

    .price {
        margin-bottom: 8px;
    }

    .price del {
        color: #999;
        margin-right: 5px;
    }

    button {
        padding: 6px 0;
        font-size: 11px;
        background: #fff;
        border: 1px solid #000;
        cursor: pointer;
    }

    button:hover {
        background: #000;
        color: #fff;
    }
</style>
</head>

<body>

<div class="wrapper">
    <div class="products">

        <div class="product">
            <img src="https://via.placeholder.com/150">
            <h4>Fjällräven Backpack</h4>
            <div class="price">$109.95</div>
            <button>ADD TO CART</button>
        </div>

        <div class="product">
            <img src="https://via.placeholder.com/150x ">
            <h4>Mens Casual Premium</h4>
            <div class="price"><del>$22.30</del> $18.99</div>
            <button>ADD TO CART</button>
        </div>

        <div class="product">
            <img src="https://via.placeholder.com/150">
            <h4>Mens Cotton Jacket</h4>
            <div class="price">$55.99</div>
            <button>ADD TO CART</button>
        </div>

        <div class="product">
            <img src="https://via.placeholder.com/150">
            <h4>Mens Casual Slim Fit</h4>
            <div class="price">$15.99</div>
            <button>ADD TO CART</button>
        </div>

        <div class="product">
            <img src="https://via.placeholder.com/150">
            <h4>John Hardy Bracelet</h4>
            <div class="price">$695</div>
            <button>ADD TO CART</button>
        </div>

        <div class="product">
            <img src="https://via.placeholder.com/150">
            <h4>SanDisk SSD PLUS</h4>
            <div class="price">$64</div>
            <button>ADD TO CART</button>
        </div>

    </div>
</div>

</body>
</html>
