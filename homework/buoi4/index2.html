<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Task Tracker</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Task Master 🚀</h1>
            <p id="stats">0 tasks remaining</p>
        </header>

        <div class="input-group">
            <input type="text" id="taskInput" placeholder="Hôm nay bạn cần làm gì?">
            <button id="addBtn"><i class="fas fa-plus"></i></button>
        </div>

        <div class="filters">
            <span class="active" data-filter="all">All</span>
            <span data-filter="pending">Pending</span>
            <span data-filter="completed">Completed</span>
        </div>

        <ul id="taskList">
            </ul>
        
        <button id="clearAll" class="clear-btn">Xóa tất cả</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
