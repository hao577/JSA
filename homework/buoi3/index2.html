    <script>
        let n = prompt();

        for (let i = 1; i <= n; i++) {
            let line = "";
            for (let j = 1; j <= i; j++) {
                line += j;
                }
                console.log(line);
            }
        
        let str = prompt("Nhập chuỗi:");

        for (let i = str.length - 2; i >= 0; i--) {
            result += str[i];
        }

        console.log(result);
    </script>
