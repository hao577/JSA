<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2048 Neon | Nostalgia Gaming</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;800&family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --cg-bg: #11111c; --cg-panel: #1a1a2e; --cg-purple: #6a5acd; --primary: #00f2ff; }
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; font-family: 'Outfit', sans-serif; }
        body { background: var(--cg-bg); color: #fff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; touch-action: none; }

        /* NAVBAR TỐI GIẢN */
        .cg-navbar { height: 60px; background: var(--cg-panel); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; border-bottom: 1px solid rgba(255,255,255,0.05); z-index: 100; }
        .cg-logo { font-size: 20px; font-weight: 900; display: flex; align-items: center; gap: 10px; color: #fff; text-decoration: none;}
        .cg-nav-right { display: flex; align-items: center; gap: 15px; }
        .cg-icon-btn { background: rgba(255,255,255,0.1); border: none; color: #fff; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; }
        .cg-user-btn { background: rgba(255,255,255,0.1); color: white; border: none; padding: 8px 20px; border-radius: 20px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: 0.2s;}
        .cg-user-btn:hover { background: rgba(255,255,255,0.2); }
        .cg-user-btn.login-mode { background: var(--cg-purple); }

        .cg-layout { display: flex; max-width: 1400px; width: 100%; margin: 20px auto; gap: 20px; padding: 0 20px; flex: 1; overflow: hidden; }
        .cg-main { flex: 1; display: flex; flex-direction: column; min-width: 0; }

        /* SIDEBAR HÀNG DỌC */
        .cg-sidebar { width: 300px; display: flex; flex-direction: column; overflow-y: auto; padding-right: 5px; }
        .cg-sidebar h3 { font-size: 18px; margin-bottom: 15px; padding-left: 5px; color: #fff; }
        .cg-games-list { display: flex; flex-direction: column; gap: 10px; }
        .cg-game-item { display: flex; align-items: center; gap: 15px; background: rgba(255,255,255,0.02); padding: 10px; border-radius: 12px; cursor: pointer; border: 1px solid rgba(255,255,255,0.05); transition: 0.3s; }
        .cg-game-item:hover { background: rgba(255,255,255,0.08); transform: translateX(5px); border-color: rgba(255,255,255,0.1); }
        .cg-game-thumb { width: 60px; height: 60px; border-radius: 10px; object-fit: cover; flex-shrink: 0; }
        .cg-game-info { display: flex; flex-direction: column; gap: 5px; }
        .cg-game-title { font-size: 15px; font-weight: bold; color: #fff; }
        .cg-game-cate { font-size: 12px; color: #888; }

        /* GAME PLAYER */
        .cg-player-wrapper { flex: 1; background: #050510; border-radius: 12px 12px 0 0; position: relative; overflow: hidden; display: flex; justify-content: center; align-items: center; box-shadow: inset 0 0 50px rgba(0, 242, 255, 0.05); }
        .cg-warning { position: absolute; top: 0; left: 0; width: 100%; background: rgba(139, 0, 0, 0.95); padding: 12px; display: none; justify-content: center; align-items: center; gap: 15px; z-index: 60; font-size: 14px; backdrop-filter: blur(5px);}
        .cg-warning span { color: #ffcccc; font-weight: 600; }
        .cg-btn-outline { border: 1px solid #fff; background: transparent; color: #fff; padding: 4px 15px; border-radius: 15px; cursor: pointer; }
        .cg-btn-solid { background: #fff; color: #000; border: none; padding: 5px 15px; border-radius: 15px; cursor: pointer; font-weight: bold; }

        .cg-loading { position: absolute; inset: 0; background: #111; z-index: 50; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.5s; }
        .cg-thumb { width: 220px; height: 130px; object-fit: cover; border-radius: 12px; border: 3px solid var(--primary); margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,242,255,0.4); }
        .cg-loading h2 { font-size: 28px; margin-bottom: 30px; text-shadow: 0 2px 5px #000; }
        .cg-bar-bg { width: 50%; max-width: 400px; height: 10px; background: #000; border-radius: 5px; overflow: hidden; margin-bottom: 10px; border: 1px solid rgba(0,242,255,0.3);}
        .cg-bar-fill { width: 0%; height: 100%; background: var(--primary); transition: width 0.1s linear; box-shadow: 0 0 10px var(--primary);}

        /* 2048 NEON UI */
        .game-board-area { display: flex; flex-direction: column; align-items: center; gap: 20px; z-index: 40; }
        .score-hud { display: flex; gap: 15px; }
        .hud-box { background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); padding: 8px 20px; border-radius: 10px; border: 1px solid rgba(0,242,255,0.3); text-align: center; min-width: 90px; box-shadow: 0 5px 15px rgba(0,0,0,0.5);}
        .hud-label { font-size: 11px; color: #ccc; font-weight: bold; letter-spacing: 1px;}
        .hud-val { font-size: 22px; color: var(--primary); font-weight: bold; font-family: 'Press Start 2P', cursive; margin-top: 5px; text-shadow: 0 0 10px var(--primary);}

        .game-container { width: 340px; height: 340px; background: rgba(10, 10, 20, 0.8); border-radius: 12px; padding: 10px; position: relative; border: 2px solid rgba(0,242,255,0.3); box-shadow: 0 0 30px rgba(0,242,255,0.15); }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); grid-gap: 10px; width: 100%; height: 100%; }
        .cell { background: rgba(255,255,255,0.03); border-radius: 8px; display: flex; justify-content: center; align-items: center; font-size: 32px; font-weight: 800; color: #fff; transition: 0.15s; border: 1px solid rgba(255,255,255,0.05); }
        
        /* Neon Colors for Tiles */
        .cell-2 { background: #000; border-color: #00f2ff; color: #00f2ff; text-shadow: 0 0 10px #00f2ff; box-shadow: inset 0 0 15px rgba(0, 242, 255, 0.2); }
        .cell-4 { background: #000; border-color: #bc13fe; color: #bc13fe; text-shadow: 0 0 10px #bc13fe; box-shadow: inset 0 0 15px rgba(188, 19, 254, 0.2); }
        .cell-8 { background: #000; border-color: #ff007a; color: #ff007a; text-shadow: 0 0 10px #ff007a; box-shadow: inset 0 0 15px rgba(255, 0, 122, 0.2); }
        .cell-16 { background: #000; border-color: #f1c40f; color: #f1c40f; text-shadow: 0 0 10px #f1c40f; box-shadow: inset 0 0 15px rgba(241, 196, 15, 0.2); }
        .cell-32 { background: #000; border-color: #ff4757; color: #ff4757; text-shadow: 0 0 10px #ff4757; box-shadow: inset 0 0 15px rgba(255, 71, 87, 0.2); }
        .cell-64 { background: #000; border-color: #00e676; color: #00e676; text-shadow: 0 0 10px #00e676; box-shadow: inset 0 0 15px rgba(0, 230, 118, 0.2); }
        .cell-128 { background: #000; border-color: #00f2ff; color: #00f2ff; text-shadow: 0 0 15px #00f2ff; box-shadow: 0 0 10px rgba(0,242,255,0.4), inset 0 0 20px rgba(0, 242, 255, 0.4); font-size: 28px;}
        .cell-256 { background: #000; border-color: #bc13fe; color: #bc13fe; text-shadow: 0 0 15px #bc13fe; box-shadow: 0 0 15px rgba(188,19,254,0.5), inset 0 0 20px rgba(188, 19, 254, 0.4); font-size: 28px;}
        .cell-512 { background: #000; border-color: #ff007a; color: #ff007a; text-shadow: 0 0 15px #ff007a; box-shadow: 0 0 20px rgba(255,0,122,0.6), inset 0 0 20px rgba(255, 0, 122, 0.4); font-size: 28px;}
        .cell-1024 { background: #000; border-color: #f1c40f; color: #f1c40f; text-shadow: 0 0 20px #f1c40f; box-shadow: 0 0 25px rgba(241,196,15,0.7), inset 0 0 25px rgba(241, 196, 15, 0.5); font-size: 24px;}
        .cell-2048 { background: #fff; border-color: #fff; color: #000; text-shadow: none; box-shadow: 0 0 30px #fff; font-size: 24px;}

        .modal { position: absolute; inset: 0; background: rgba(10,10,20,0.85); backdrop-filter: blur(10px); border-radius: 10px; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; opacity: 0; pointer-events: none; transition: 0.3s; border: 1px solid rgba(0,242,255,0.3);}
        .modal.show { opacity: 1; pointer-events: all; }
        .modal h1 { font-family: 'Press Start 2P', cursive; font-size: 25px; color: var(--primary); margin-bottom: 10px; text-shadow: 0 0 15px var(--primary);}
        .btn-action { padding: 12px 30px; background: linear-gradient(135deg, #00f2ff, #bc13fe); color: #fff; border: none; border-radius: 30px; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 15px; font-family: 'Outfit', sans-serif; text-transform: uppercase; letter-spacing: 1px; box-shadow: 0 5px 15px rgba(188,19,254,0.4);}

        .cg-toolbar { height: 60px; background: var(--cg-panel); display: flex; justify-content: space-between; align-items: center; padding: 0 20px; border-radius: 0 0 12px 12px; }
        .cg-tool-left { display: flex; align-items: center; gap: 15px; }
        .cg-tool-left img { width: 35px; height: 35px; border-radius: 8px; object-fit: cover;}
        .cg-tool-right { display: flex; gap: 8px; }
        .cg-tool-btn { background: rgba(255,255,255,0.05); border: none; color: #ccc; width: 36px; height: 36px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s;}
        .cg-tool-btn:hover { background: rgba(255,255,255,0.15); color: #fff; }

        @media (max-width: 900px) { .cg-sidebar { display: none; } }
        @media (max-width: 600px) { .game-container { width: 300px; height: 300px; } .cell { font-size: 24px; } .cell-128, .cell-256, .cell-512 { font-size: 20px;} .cell-1024, .cell-2048 {font-size: 16px;} }
    </style>
</head>
<body>

    <nav class="cg-navbar">
        <a href="index.html" class="cg-logo"><i class="fas fa-gamepad" style="color: var(--cg-purple);"></i> CRAZY NOSTALGIA</a>
        <div class="cg-nav-right">
            <button class="cg-icon-btn"><i class="fas fa-bell"></i></button>
            <button class="cg-user-btn" id="nav-user-btn" onclick="window.location.href='login.html'">Đăng nhập</button>
        </div>
    </nav>

    <div class="cg-layout">
        <div class="cg-main">
            <div class="cg-player-wrapper" id="game-player">
                
                <div class="cg-warning" id="guest-warning">
                    <span>Bạn đang chơi bằng chế độ Khách! Tiến trình sẽ không lưu.</span>
                    <button class="cg-btn-outline" onclick="document.getElementById('guest-warning').style.display='none'">Đóng</button>
                    <button class="cg-btn-solid" onclick="window.location.href='login.html'">Đăng nhập</button>
                </div>

                <div class="cg-loading" id="loading-overlay">
                    <img src="https://images.unsplash.com/photo-1614332287897-cdc485fa562d?w=500" class="cg-thumb">
                    <h2>2048 Neon</h2>
                    <div class="cg-bar-bg"><div class="cg-bar-fill" id="load-fill"></div></div>
                    <div style="font-weight: bold; color: var(--primary);"><span id="load-text">0%</span></div>
                </div>

                <div class="game-board-area hide" id="board-area">
                    <div class="score-hud">
                        <div class="hud-box"><div class="hud-label">SCORE</div><div class="hud-val" id="score">0</div></div>
                        <div class="hud-box"><div class="hud-label">BEST</div><div class="hud-val" id="best">0</div></div>
                    </div>
                    
                    <div class="game-container">
                        <div class="grid" id="grid"></div>
                        <div class="modal" id="game-over">
                            <h1 style="color:#ff007a; text-shadow:0 0 15px #ff007a;">GAME OVER</h1>
                            <div style="color: #f1c40f; font-weight: bold; font-size: 20px; text-shadow: 0 0 10px #f1c40f;" id="coin-reward">+0 Coins</div>
                            <button class="btn-action" onclick="Game.init()">CHƠI LẠI</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="cg-toolbar">
                <div class="cg-tool-left">
                    <img src="https://images.unsplash.com/photo-1614332287897-cdc485fa562d?w=100">
                    <h3 style="font-size: 16px;">2048 Neon</h3>
                </div>
                <div class="cg-tool-right">
                    <button class="cg-tool-btn" onclick="toggleFullscreen()" title="Toàn màn hình"><i class="fas fa-expand"></i></button>
                </div>
            </div>
        </div>

        <div class="cg-sidebar">
            <h3>🔥 Trò chơi nổi bật</h3>
            <div class="cg-games-list">
                <div class="cg-game-item" onclick="window.location.href='pacman.html'">
                    <img src="https://images.unsplash.com/photo-1612404730960-5c71577fca11?w=200" class="cg-game-thumb" style="filter: hue-rotate(40deg);">
                    <div class="cg-game-info">
                        <div class="cg-game-title">Pac-Man Retro</div>
                        <div class="cg-game-cate">Hành động</div>
                    </div>
                </div>
                <div class="cg-game-item" onclick="window.location.href='flappy.html'">
                    <img src="https://images.unsplash.com/photo-1518709268805-4e9042af9f23?w=200" class="cg-game-thumb">
                    <div class="cg-game-info">
                        <div class="cg-game-title">Cyber Bird</div>
                        <div class="cg-game-cate">Kỹ năng</div>
                    </div>
                </div>
                <div class="cg-game-item" onclick="window.location.href='snake.html'">
                    <img src="https://images.unsplash.com/photo-1534438327276-14e5300c3a48?w=200" class="cg-game-thumb" style="filter: hue-rotate(100deg);">
                    <div class="cg-game-info">
                        <div class="cg-game-title">Snake Xenzia</div>
                        <div class="cg-game-cate">Cổ điển</div>
                    </div>
                </div>
                <div class="cg-game-item" onclick="window.location.href='memory.html'">
                    <img src="https://images.unsplash.com/photo-1606326608606-aa0b62935f2b?w=200" class="cg-game-thumb">
                    <div class="cg-game-info">
                        <div class="cg-game-title">Memory Master</div>
                        <div class="cg-game-cate">Trí tuệ</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function toggleFullscreen() {
            let elem = document.getElementById("game-player");
            if (!document.fullscreenElement) elem.requestFullscreen().catch(err => {}); else document.exitFullscreen();
        }

        window.onload = () => {
            let progress = 0;
            let interval = setInterval(() => {
                progress += Math.floor(Math.random() * 20) + 10;
                if(progress >= 100) {
                    progress = 100; clearInterval(interval);
                    setTimeout(() => {
                        document.getElementById('loading-overlay').style.opacity = '0';
                        setTimeout(() => { 
                            document.getElementById('loading-overlay').style.display = 'none'; 
                            document.getElementById('board-area').classList.remove('hide');
                        }, 500);
                    }, 300);
                }
                document.getElementById('load-fill').style.width = progress + '%';
                document.getElementById('load-text').innerText = progress + '%';
            }, 150);
        };

        let userData = JSON.parse(localStorage.getItem('currentUser'));
        let isGuestUser = (!userData || userData.isGuest === true || userData.username === 'Guest');
        
        let userBtn = document.getElementById('nav-user-btn');
        if(isGuestUser) {
            document.getElementById('guest-warning').style.display = 'flex';
            userBtn.classList.add('login-mode');
            userBtn.innerHTML = 'Đăng nhập';
        } else {
            userBtn.innerHTML = `<i class="fas fa-user-circle"></i> ${userData.username}`;
            userBtn.onclick = null; 
        }

        document.getElementById('best').innerText = isGuestUser ? 0 : (userData['2048_best'] || 0);

        const Game = {
            board: [], score: 0, maxTile: 0,
            init() {
                this.board = Array(4).fill().map(() => Array(4).fill(0));
                this.score = 0; this.maxTile = 0;
                document.getElementById('score').innerText = this.score;
                document.getElementById('game-over').classList.remove('show');
                this.addRandomTile(); this.addRandomTile();
                this.draw();
            },
            addRandomTile() {
                let emptySpots = [];
                for(let r=0; r<4; r++) for(let c=0; c<4; c++) if(this.board[r][c] === 0) emptySpots.push({r, c});
                if(emptySpots.length > 0) {
                    let spot = emptySpots[Math.floor(Math.random() * emptySpots.length)];
                    this.board[spot.r][spot.c] = Math.random() > 0.1 ? 2 : 4;
                }
            },
            draw() {
                const grid = document.getElementById('grid'); grid.innerHTML = '';
                for(let r=0; r<4; r++) {
                    for(let c=0; c<4; c++) {
                        let val = this.board[r][c];
                        let cell = document.createElement('div');
                        cell.className = `cell ${val > 0 ? 'cell-'+val : ''}`;
                        cell.innerText = val > 0 ? val : '';
                        if(val > this.maxTile) this.maxTile = val;
                        grid.appendChild(cell);
                    }
                }
                
                if(!isGuestUser) {
                    if(this.score > (userData['2048_best'] || 0)) userData['2048_best'] = this.score;
                    if(this.score > (userData['2048_score_mission'] || 0)) userData['2048_score_mission'] = this.score;
                    if(this.maxTile > (userData['2048_max_tile'] || 0)) userData['2048_max_tile'] = this.maxTile;
                    if(this.maxTile > (userData['2048_tile_mission'] || 0)) userData['2048_tile_mission'] = this.maxTile;
                    
                    document.getElementById('best').innerText = userData['2048_best'];
                    localStorage.setItem('currentUser', JSON.stringify(userData));
                    localStorage.setItem('user_' + userData.username, JSON.stringify(userData));
                }
            },
            slide(row) {
                let filteredRow = row.filter(val => val); let missing = 4 - filteredRow.length;
                return filteredRow.concat(Array(missing).fill(0));
            },
            combine(row) {
                for(let i=0; i<3; i++) {
                    if(row[i] !== 0 && row[i] === row[i+1]) {
                        row[i] *= 2; row[i+1] = 0; this.score += row[i];
                        document.getElementById('score').innerText = this.score;
                    }
                } return row;
            },
            move(direction) {
                let moved = false;
                for(let i=0; i<4; i++) {
                    let row = [];
                    if(direction === 'LEFT' || direction === 'RIGHT') { row = this.board[i]; if(direction === 'RIGHT') row.reverse(); } 
                    else { row = [this.board[0][i], this.board[1][i], this.board[2][i], this.board[3][i]]; if(direction === 'DOWN') row.reverse(); }

                    let original = [...row];
                    row = this.slide(row); row = this.combine(row); row = this.slide(row);
                    if(original.join(',') !== row.join(',')) moved = true;

                    if(direction === 'LEFT' || direction === 'RIGHT') {
                        if(direction === 'RIGHT') row.reverse(); this.board[i] = row;
                    } else {
                        if(direction === 'DOWN') row.reverse();
                        this.board[0][i] = row[0]; this.board[1][i] = row[1]; this.board[2][i] = row[2]; this.board[3][i] = row[3];
                    }
                }
                if(moved) { this.addRandomTile(); this.draw(); this.checkGameOver(); }
            },
            checkGameOver() {
                let over = true;
                for(let r=0; r<4; r++) {
                    for(let c=0; c<4; c++) {
                        if(this.board[r][c] === 0) over = false;
                        if(c !== 3 && this.board[r][c] === this.board[r][c+1]) over = false;
                        if(r !== 3 && this.board[r][c] === this.board[r+1][c]) over = false;
                    }
                }
                if(over) {
                    let earnedCoins = Math.floor(this.score / 50);
                    if(!isGuestUser) {
                        userData.coins = (userData.coins || 0) + earnedCoins;
                        localStorage.setItem('currentUser', JSON.stringify(userData));
                        document.getElementById('coin-reward').innerText = `+${earnedCoins} Coins`;
                    } else {
                        document.getElementById('coin-reward').innerText = "Guest không nhận Xu";
                    }
                    document.getElementById('game-over').classList.add('show');
                }
            }
        };

        Game.init();

        document.addEventListener('keydown', e => {
            if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"].indexOf(e.code) > -1) e.preventDefault();
            if(e.key === 'ArrowLeft') Game.move('LEFT'); else if(e.key === 'ArrowRight') Game.move('RIGHT');
            else if(e.key === 'ArrowUp') Game.move('UP'); else if(e.key === 'ArrowDown') Game.move('DOWN');
        });

        let tX = 0, tY = 0;
        document.addEventListener('touchstart', e => { tX = e.changedTouches[0].screenX; tY = e.changedTouches[0].screenY; }, {passive: false});
        document.addEventListener('touchend', e => {
            if(e.target.tagName === 'A' || e.target.tagName === 'BUTTON') return;
            e.preventDefault();
            let dx = e.changedTouches[0].screenX - tX; let dy = e.changedTouches[0].screenY - tY;
            if(Math.abs(dx) > Math.abs(dy)) {
                if(dx > 30) Game.move('RIGHT'); else if(dx < -30) Game.move('LEFT');
            } else {
                if(dy > 30) Game.move('DOWN'); else if(dy < -30) Game.move('UP');
            }
        }, {passive: false});
    </script>
</body>
</html>
