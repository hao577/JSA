<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nostalgia ID | Access Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #0c0f1d; --primary: #00f2ff; --secondary: #bc13fe;
            --white: #ffffff; --glass: rgba(255, 255, 255, 0.05); --border: rgba(255, 255, 255, 0.1);
            --shadow: 0 15px 35px rgba(0, 0, 0, 0.5); --font-display: 'Rajdhani', sans-serif;
            --font-body: 'Poppins', sans-serif; --success: #00b894; --error: #ff4757;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        body { background-color: var(--bg-color); display: flex; justify-content: center; align-items: center; flex-direction: column; height: 100vh; overflow: hidden; font-family: var(--font-body); position: relative; }

        #canvas-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }

        .container { background: var(--glass); border-radius: 20px; box-shadow: var(--shadow), inset 0 0 20px rgba(255,255,255,0.02); position: relative; overflow: hidden; width: 850px; max-width: 100%; min-height: 550px; z-index: 10; border: 1px solid var(--border); backdrop-filter: blur(10px); }

        .form-container { position: absolute; top: 0; height: 100%; transition: all 0.6s ease-in-out; }
        .sign-in-container { left: 0; width: 50%; z-index: 2; }
        .sign-up-container { left: 0; width: 50%; opacity: 0; z-index: 1; }
        
        .container.right-panel-active .sign-in-container { transform: translateX(100%); opacity: 0; }
        .container.right-panel-active .sign-up-container { transform: translateX(100%); opacity: 1; z-index: 5; animation: show 0.6s; }
        
        @keyframes show { 0%, 49.99% { opacity: 0; z-index: 1; } 50%, 100% { opacity: 1; z-index: 5; } }

        form { background: transparent; display: flex; align-items: center; justify-content: center; flex-direction: column; padding: 0 50px; height: 100%; text-align: center; color: var(--white); }

        h1 { font-family: var(--font-display); font-weight: 700; font-size: 36px; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; background: linear-gradient(to right, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        span.hint { font-size: 13px; color: #ccc; margin-bottom: 25px; display: block; }

        .input-group { position: relative; width: 100%; margin: 10px 0; }
        input { background-color: rgba(0,0,0,0.2); border: 1px solid var(--border); padding: 12px 45px; width: 100%; color: var(--white); border-radius: 8px; font-family: var(--font-body); transition: 0.3s; }
        .input-icon { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #a0a0a0; transition: 0.3s; }
        .toggle-password { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: #a0a0a0; cursor: pointer; transition: 0.3s; }
        .toggle-password:hover { color: var(--primary); }
        input:focus { background-color: rgba(0,0,0,0.4); border-color: var(--primary); box-shadow: 0 0 15px rgba(0, 242, 255, 0.2); }
        input:focus ~ .input-icon { color: var(--primary); }

        button.action-btn { border-radius: 50px; border: none; background: linear-gradient(90deg, var(--secondary), var(--primary)); color: var(--white); font-size: 14px; font-weight: bold; padding: 12px 45px; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; margin-top: 20px; transition: 0.3s; font-family: var(--font-display); width: 100%; }
        button.action-btn:hover:not(:disabled) { box-shadow: 0 0 25px rgba(188, 19, 254, 0.5); transform: scale(1.05); }
        button.action-btn:disabled { opacity: 0.7; cursor: not-allowed; }

        button.guest-btn { border-radius: 50px; border: 1px solid var(--primary); background: transparent; color: var(--primary); font-size: 14px; font-weight: bold; padding: 10px 45px; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; margin-top: 15px; transition: 0.3s; font-family: var(--font-display); width: 100%; }
        button.guest-btn:hover { background: rgba(0, 242, 255, 0.1); box-shadow: 0 0 15px rgba(0, 242, 255, 0.3); }

        .overlay-container { position: absolute; top: 0; left: 50%; width: 50%; height: 100%; overflow: hidden; transition: transform 0.6s ease-in-out; z-index: 100; }
        .container.right-panel-active .overlay-container { transform: translateX(-100%); }
        .overlay { background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); color: #FFFFFF; position: relative; left: -100%; height: 100%; width: 200%; transform: translateX(0); transition: transform 0.6s ease-in-out; }
        .container.right-panel-active .overlay { transform: translateX(50%); }
        .overlay-panel { position: absolute; display: flex; align-items: center; justify-content: center; flex-direction: column; padding: 0 40px; text-align: center; top: 0; height: 100%; width: 50%; transform: translateX(0); transition: transform 0.6s ease-in-out; }
        .overlay-left { transform: translateX(-20%); }
        .container.right-panel-active .overlay-left { transform: translateX(0); }
        .overlay-right { right: 0; transform: translateX(0); }
        .container.right-panel-active .overlay-right { transform: translateX(20%); }
        .overlay p { font-size: 14px; font-weight: 300; line-height: 20px; letter-spacing: 0.5px; margin: 20px 0 30px; color: rgba(255,255,255,0.8); }
        
        button.ghost { background: transparent; border: 1px solid var(--white); border-radius: 50px; color: var(--white); font-size: 14px; font-weight: bold; padding: 12px 45px; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; transition: 0.3s; font-family: var(--font-display); }
        button.ghost:hover { background: var(--white); color: var(--bg-color); box-shadow: 0 0 20px rgba(255,255,255,0.5); }

        #toast-box { position: fixed; top: 30px; right: 30px; z-index: 200; display: flex; flex-direction: column; gap: 10px; }
        .toast { width: 300px; padding: 15px; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); border-left: 5px solid; border-radius: 4px; color: white; font-size: 14px; display: flex; align-items: center; gap: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); transform: translateX(120%); animation: slideIn 0.5s forwards, fadeOut 0.5s forwards 3s; }
        .toast.success { border-color: var(--success); }
        .toast.error { border-color: var(--error); }
        @keyframes slideIn { to { transform: translateX(0); } }
        @keyframes fadeOut { to { opacity: 0; visibility: hidden; } }
    </style>
</head>
<body>

    <canvas id="canvas-bg"></canvas>
    <div id="toast-box"></div>

    <div class="container" id="container">
        <div class="form-container sign-up-container">
            <form id="form-register">
                <h1>Tạo Tài Khoản</h1>
                <span class="hint">Đăng ký để lưu trữ dữ liệu và kiếm xu!</span>
                
                <div class="input-group">
                    <input type="text" id="reg-username" placeholder="Tên nhân vật (Viết liền không dấu)" required />
                    <i class="fas fa-user input-icon"></i>
                </div>
                <div class="input-group">
                    <input type="email" id="reg-email" placeholder="Email (Chỉ để nhận thông báo)" required />
                    <i class="fas fa-envelope input-icon"></i>
                </div>
                <div class="input-group">
                    <input type="password" id="reg-pass" placeholder="Mật khẩu (Tối thiểu 6 ký tự)" required />
                    <i class="fas fa-lock input-icon"></i>
                    <i class="fas fa-eye toggle-password" onclick="togglePassword('reg-pass', this)"></i>
                </div>
                <div class="input-group">
                    <input type="password" id="reg-pass-confirm" placeholder="Xác nhận lại mật khẩu" required />
                    <i class="fas fa-lock input-icon"></i>
                    <i class="fas fa-eye toggle-password" onclick="togglePassword('reg-pass-confirm', this)"></i>
                </div>
                
                <button type="submit" class="action-btn" id="btn-register">Đăng Ký Ngay</button>
            </form>
        </div>

        <div class="form-container sign-in-container">
            <form id="form-login">
                <h1>Đăng Nhập</h1>
                <span class="hint">Chào mừng trở lại, Game thủ!</span>
                
                <div class="input-group">
                    <input type="text" id="login-username" placeholder="Tên nhân vật" required />
                    <i class="fas fa-user input-icon"></i>
                </div>
                <div class="input-group">
                    <input type="password" id="login-pass" placeholder="Mật khẩu" required />
                    <i class="fas fa-lock input-icon"></i>
                    <i class="fas fa-eye toggle-password" onclick="togglePassword('login-pass', this)"></i>
                </div>
                
                <button type="submit" class="action-btn" id="btn-login">Vào Game</button>
                <button type="button" class="guest-btn" id="btn-guest">Chơi dưới dạng Khách</button>
            </form>
        </div>

        <div class="overlay-container">
            <div class="overlay">
                <div class="overlay-panel overlay-left">
                    <h1>Đã có tài khoản?</h1>
                    <p>Đăng nhập ngay để tiếp tục chiến đấu và leo bảng xếp hạng!</p>
                    <button class="ghost" id="signIn">Đăng Nhập</button>
                </div>
                <div class="overlay-panel overlay-right">
                    <h1>Chưa có tài khoản?</h1>
                    <p>Tạo ngay tài khoản miễn phí để lưu điểm số và mở khóa đầy đủ tính năng.</p>
                    <button class="ghost" id="signUp">Đăng Ký</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function togglePassword(inputId, icon) {
            const input = document.getElementById(inputId);
            if (input.type === "password") { input.type = "text"; icon.classList.replace("fa-eye", "fa-eye-slash"); } 
            else { input.type = "password"; icon.classList.replace("fa-eye-slash", "fa-eye"); }
        }

        const signUpButton = document.getElementById('signUp');
        const signInButton = document.getElementById('signIn');
        const container = document.getElementById('container');
        signUpButton.addEventListener('click', () => container.classList.add("right-panel-active"));
        signInButton.addEventListener('click', () => container.classList.remove("right-panel-active"));

        // HIỆU ỨNG CANVAS BACKGROUND
        const canvas = document.getElementById("canvas-bg");
        const ctx = canvas.getContext("2d");
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        let particlesArray;
        const mouse = { x: null, y: null, radius: 100 }
        window.addEventListener('mousemove', (e) => { mouse.x = e.x; mouse.y = e.y; });
        
        class Particle {
            constructor(x, y, dx, dy, size, color) { this.x = x; this.y = y; this.dx = dx; this.dy = dy; this.size = size; this.color = color; }
            draw() { ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2, false); ctx.fillStyle = '#00f2ff'; ctx.fill(); }
            update() {
                if (this.x > canvas.width || this.x < 0) this.dx = -this.dx;
                if (this.y > canvas.height || this.y < 0) this.dy = -this.dy;
                let dx = mouse.x - this.x; let dy = mouse.y - this.y;
                let distance = Math.sqrt(dx*dx + dy*dy);
                if (distance < mouse.radius + this.size) {
                    if (mouse.x < this.x && this.x < canvas.width - this.size*10) this.x += 5;
                    if (mouse.x > this.x && this.x > this.size*10) this.x -= 5;
                    if (mouse.y < this.y && this.y < canvas.height - this.size*10) this.y += 5;
                    if (mouse.y > this.y && this.y > this.size*10) this.y -= 5;
                }
                this.x += this.dx; this.y += this.dy; this.draw();
            }
        }
        function initParticles() {
            particlesArray = [];
            let numberOfParticles = (canvas.height * canvas.width) / 9000;
            for (let i=0; i<numberOfParticles; i++) {
                let size = (Math.random()*2)+1;
                let x = (Math.random()*((innerWidth-size*2)-(size*2))+size*2);
                let y = (Math.random()*((innerHeight-size*2)-(size*2))+size*2);
                let dx = (Math.random()*1.5)-0.75; let dy = (Math.random()*1.5)-0.75;
                particlesArray.push(new Particle(x, y, dx, dy, size, '#fff'));
            }
        }
        function animateParticles() {
            requestAnimationFrame(animateParticles); ctx.clearRect(0,0,innerWidth, innerHeight);
            for (let i=0; i<particlesArray.length; i++) particlesArray[i].update();
            connectParticles();
        }
        function connectParticles() {
            let opacityValue = 1;
            for (let a=0; a<particlesArray.length; a++) {
                for (let b=a; b<particlesArray.length; b++) {
                    let distance = ((particlesArray[a].x - particlesArray[b].x)*(particlesArray[a].x - particlesArray[b].x)) + ((particlesArray[a].y - particlesArray[b].y)*(particlesArray[a].y - particlesArray[b].y));
                    if (distance < (canvas.width/7)*(canvas.height/7)) {
                        opacityValue = 1 - (distance/20000); ctx.strokeStyle = 'rgba(0, 242, 255,'+opacityValue+')';
                        ctx.lineWidth = 1; ctx.beginPath(); ctx.moveTo(particlesArray[a].x, particlesArray[a].y); ctx.lineTo(particlesArray[b].x, particlesArray[b].y); ctx.stroke();
                    }
                }
            }
        }
        initParticles(); animateParticles();
        window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; initParticles(); });

        // TOAST NOTIFICATIONS
        function showToast(msg, type = 'success') {
            const toastBox = document.getElementById('toast-box');
            const toast = document.createElement('div'); toast.classList.add('toast', type);
            let icon = type === 'success' ? '<i class="fas fa-check-circle" style="color:var(--success)"></i>' : '<i class="fas fa-exclamation-circle" style="color:var(--error)"></i>';
            toast.innerHTML = `${icon} <span>${msg}</span>`; toastBox.appendChild(toast);
            setTimeout(() => { toast.remove(); }, 3500);
        }

        // ĐĂNG KÝ
        document.getElementById('form-register').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('btn-register');
            const usernameInput = document.getElementById('reg-username').value.trim();
            const passInput = document.getElementById('reg-pass').value;
            const confirmPassInput = document.getElementById('reg-pass-confirm').value;

            if (usernameInput.includes(' ')) return showToast('Tên nhân vật không được chứa khoảng trắng!', 'error');
            if (passInput.length < 6) return showToast('Mật khẩu phải dài ít nhất 6 ký tự!', 'error');
            if (passInput !== confirmPassInput) return showToast('Mật khẩu xác nhận không khớp!', 'error');
            if (usernameInput.toLowerCase() === 'guest') return showToast('Không được đặt tên là Guest!', 'error');

            btn.disabled = true; btn.innerText = "Đang xử lý...";

            setTimeout(() => {
                if (localStorage.getItem('user_' + usernameInput)) {
                    showToast('Tên nhân vật này đã có người sử dụng!', 'error');
                    btn.disabled = false; btn.innerText = "Đăng Ký Ngay"; return;
                }
                const userData = { username: usernameInput, password: passInput, isGuest: false, coins: 0, inventory: [], claimedMissions: [] };
                localStorage.setItem('user_' + usernameInput, JSON.stringify(userData));
                showToast('Đăng ký thành công! Hãy đăng nhập.');
                document.getElementById('form-register').reset();
                btn.disabled = false; btn.innerText = "Đăng Ký Ngay";
                setTimeout(() => { container.classList.remove("right-panel-active"); document.getElementById('login-username').value = usernameInput; }, 800);
            }, 500);
        });

        // ĐĂNG NHẬP
        document.getElementById('form-login').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('btn-login');
            const usernameInput = document.getElementById('login-username').value.trim();
            const passInput = document.getElementById('login-pass').value;

            btn.disabled = true; btn.innerText = "Đang kết nối...";

            setTimeout(() => {
                const storedUser = localStorage.getItem('user_' + usernameInput);
                if (!storedUser) {
                    showToast('Tên nhân vật không tồn tại!', 'error');
                    btn.disabled = false; btn.innerText = "Vào Game"; return;
                }
                const userData = JSON.parse(storedUser);
                if (passInput === userData.password) {
                    showToast('Đăng nhập thành công! Đang tải dữ liệu...');
                    localStorage.setItem('currentUser', JSON.stringify(userData));
                    setTimeout(() => { window.location.href = 'index.html'; }, 1000);
                } else {
                    showToast('Mật khẩu không chính xác!', 'error');
                    btn.disabled = false; btn.innerText = "Vào Game";
                }
            }, 600);
        });

        // CHƠI DƯỚI DẠNG KHÁCH
        document.getElementById('btn-guest').addEventListener('click', function() {
            showToast('Đang vào với tư cách Khách...');
            const guestData = { username: 'Guest', isGuest: true, coins: 0, inventory: [], claimedMissions: [] };
            localStorage.setItem('currentUser', JSON.stringify(guestData));
            setTimeout(() => { window.location.href = 'index.html'; }, 800);
        });
    </script>
</body>
</html>
