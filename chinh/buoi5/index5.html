    <script>
        function tinhtong(n){
            let tong = 0;
            for (let i = 1;i<=n;i++) {
                tong+=i;
            }
            return tong;
        }
        let n = prompt();
        let result = tinhtong(n);
        console.log(result)

        }
        sayhello('Cong')

        function ktsonguyento(m){
            if (n<2)
                return false;
            for (let i = 2;i<=Math.sqrt(m);i++)
                if (m%i==0)
                    return false;
            return true;
        }
        let m = prompt()
        if (ktsonguyento(m))
            console.log(m, "la so nguyen to")
        else
            console.log(m,'khong phai la snt')
        
        function giaithua(k){
            let tich = 1
            for (let i = k;i>0;i--)
                tich*=i;
            return tich
        }
        let k = prompt()
        console.log(giaithua(k))
