<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Js variable</title>
</head>
<body>
    <script>
        let age = 25;
        console.log("Tuoi cua ban la: " + age);
        let name = "Nguyen Van A";
        let isGay = true;
        let school = "Bui Thi Xuan";
        console.log("Ten cua ban la: " + name);
        console.log("Ban la gay: " + isGay);
        console.log("Truong cua ban la: " + school);
        let firstname = "Bui";
        let lastname = "Quang Khai";
        let fullname = firstname + " " + lastname;
        console.log("Ho ten cua ban la: " + fullname);
        console.log("Do dai cua chuoi la: " + fullname.length);
        let dshs = "Bui Quang Khai,Khai Bui,Khai Quang Bui,Quang Bui Khai";
        let arrdshs = dshs.split(",");
        console.log("Danh sach hoc sinh: " , arrdshs);
        console.log("So hoc sinh trong danh sach: "+fullname.toUpperCase());
        console.log("So hoc sinh trong danh sach: "+fullname.toLowerCase());
        let text = "                   hello world";
        console.log("Chuoi ban dau: " + text);
        console.log("Chuoi sau khi cat khoang trang: " + text.trim());
        
    </script>
</body>
</html>
